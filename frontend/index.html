<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FTS Search Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-layer" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <p class="hero-kicker">Full-text Search</p>
        <h1>Demo</h1>
        <p class="hero-subtitle">
          Gõ từ khóa để nhận gợi ý theo thời gian thực, sau đó xem kết quả có highlight rõ ràng và an toàn.
        </p>
      </header>

      <section class="search-shell" aria-label="Khu vực tìm kiếm">
        <div class="search-input-row">
          <label class="visually-hidden" for="searchInput">Nhập từ khóa tìm kiếm</label>
          <input
            id="searchInput"
            class="search-input"
            type="text"
            autocomplete="off"
            placeholder="Nhập từ khóa, ví dụ: elasticsearch analyzer"
            aria-autocomplete="list"
            aria-controls="suggestions"
            aria-expanded="false"
          />
          <button id="searchButton" class="search-button" type="button">Search</button>
        </div>
        <ul id="suggestions" class="suggestions hidden" role="listbox" aria-label="Gợi ý từ khóa"></ul>
      </section>

      <section class="status-line" aria-live="polite">
        <span id="statusText">Sẵn sàng.</span>
      </section>

      <section class="results-panel" aria-label="Kết quả tìm kiếm">
        <div id="resultsMeta" class="results-meta">Chưa có kết quả.</div>
        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
